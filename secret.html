<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta http-equiv="X-UA-Compatible" content="ie=edge">
	<title>技术研究党</title>
	<style>
	* {
		box-sizing: border-box;
	}
	html, body {
		margin: 0;
		padding: 0;
		border: none;
	}
	img {
		max-width: 100%;
		max-height: 100%;
	}
	.hd {
		height: 40vw;
		width: 40vw;
		position: absolute;
		left: 0;
		right: 0;
		margin: auto;
	}
	#me {
		top: 10vw;
	}
	#u {
		bottom: 10vw;
	}
	@keyframes ani{
		from{
			transform:rotateY(0deg) rotateX(0deg);
		}
		to{
			transform:rotateY(360deg) rotateX(0deg);
		}
	}
	#heart{
		position: absolute;
		height:200px;
		width:150px;
		top: 0;
		left: 0;
		right: 0;
		bottom: 0;
		margin:auto;
		animation:ani 5s linear infinite; 
		transform-style:preserve-3d;
 
	}
	.line{
		position:absolute;
		height:200px;
		width:150px;
		border:2px solid red;
		border-left:0;
		border-bottom:0;
		border-radius:50% 50% 0/50% 40% 0;
	}
	#word{
		font-family:"隶书";
		font-size:1.3em;
		color:red;
		position:absolute;
		top: 80px;
		left:22px;
		font-weight:bold;
	}
	</style>
</head>
<body>
	<div id="heart">
		<div id="word">I Love You</div>
	</div>
	<div id="me" class="hd">
		<img src="http://wx2.sinaimg.cn/large/b66c1c09ly1g5r8mysfizj20cb0cbjru.jpg" alt="">
	</div>
	<div id="u" class=hd>
		<img src="http://wx3.sinaimg.cn/large/b66c1c09ly1g5r8n25xqqj20qo0qo406.jpg" alt="">
	</div>
	<script>
		var heart=document.getElementById("heart");
		var html="";
		for(var i=0;i<36;i++){
			html+="<div class='line' style='transform:rotateY("+i*10+"deg) rotateZ(45deg) translateX(25px)'></div>";
		}
		heart.innerHTML += html;
	</script>
</body>
</html>
